#!/bin/python

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "Jetutils"
version = "0.8.0"
authors = [
  { name="Hugo Banderier", email="hugo.banderier@unibe.ch" },
]
description = "JEt STream and EXtreme events analysis"
readme = "README.md"
requires-python = ">=3.13"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "cartopy>=0.25.0",
    "colormaps>=0.5.0",
    "dask>=2026.3.0",
    "matplotlib>=3.10.9",
    "mkdocs>=1.6.1",
    "mkdocs-material>=9.6.22",
    "mkdocstrings>=0.30.1",
    "mkdocstrings-python>=1.18.2",
    "polars>=1.41.1",
    "polars-ds>=0.11.2",
    "polars-st>=0.7.0",
    "rustworkx>=0.17.1",
    "scikit-learn>=1.8.0",
    "scipy>=1.17.1",
    "tqdm>=4.67.3",
    "xarray>=2026.4.0",
]

[project.urls]
"Homepage" = "https://github.com/hbanderi/jestex"
"Bug Tracker" = "https://github.com/hbanderi/jestex/issues"

